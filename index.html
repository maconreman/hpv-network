<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HPV Discourse Network — Facebook &amp; TikTok</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/graphology/0.25.4/graphology.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/2.4.0/sigma.min.js"></script>
<style>
  :root{
    --ink:#0e1a1f;
    --panel:#132530;
    --panel-line:#24404c;
    --paper:#eef4f2;
    --accent:#ff8a5c;
    --accent-dim:#8a4b34;
    --teal:#4fd1c5;
    --muted:#7fa0ac;
    --mono: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
    --sans: 'IBM Plex Sans', -apple-system, Segoe UI, sans-serif;
  }
  @font-face{font-family:'IBM Plex Sans';src:local('Arial');}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--ink);font-family:var(--sans);color:var(--paper);overflow:hidden;}

  #app{position:relative;width:100vw;height:100vh;}
  #graph-container{position:absolute;inset:0;background:
    radial-gradient(ellipse at 50% 40%, #16303a 0%, var(--ink) 70%);}

  header{
    position:absolute;top:0;left:0;right:0;z-index:10;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;pointer-events:none;
  }
  header .title{pointer-events:auto;}
  header h1{
    font-size:15px;letter-spacing:.14em;text-transform:uppercase;
    font-weight:600;margin:0 0 2px 0;color:var(--paper);
  }
  header .sub{font-family:var(--mono);font-size:11px;color:var(--muted);}

  #platform-toggle{
    pointer-events:auto;display:flex;gap:2px;background:var(--panel);
    border:1px solid var(--panel-line);border-radius:8px;padding:3px;
  }
  #platform-toggle button{
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    background:transparent;border:none;color:var(--muted);padding:8px 16px;
    border-radius:6px;cursor:pointer;transition:all .15s ease;
  }
  #platform-toggle button.active{background:var(--accent);color:#1a0e08;font-weight:600;}
  #platform-toggle button:not(.active):hover{color:var(--paper);}

  #left-rail{
    position:absolute;left:20px;bottom:20px;z-index:10;
    width:250px;background:var(--panel);border:1px solid var(--panel-line);
    border-radius:10px;padding:16px;font-size:12px;
  }
  #left-rail h2{margin:0 0 10px 0;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .stat-row{display:flex;justify-content:space-between;padding:3px 0;font-family:var(--mono);}
  .stat-row span:first-child{color:var(--muted);}
  .stat-row span:last-child{color:var(--paper);}
  .divider{height:1px;background:var(--panel-line);margin:10px 0;}

  #legend{display:flex;flex-direction:column;gap:6px;margin-top:2px;}
  .legend-item{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted);}
  .legend-dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .legend-dot.solo{border:1.5px dashed var(--muted);background:transparent;}

  #search-box{
    position:absolute;right:20px;top:70px;z-index:10;width:240px;
  }
  #search-box input{
    width:100%;background:var(--panel);border:1px solid var(--panel-line);
    border-radius:8px;padding:10px 12px;color:var(--paper);font-family:var(--mono);
    font-size:12px;outline:none;
  }
  #search-box input:focus{border-color:var(--accent);}
  #search-box input::placeholder{color:var(--muted);}
  #search-results{
    margin-top:4px;background:var(--panel);border:1px solid var(--panel-line);
    border-radius:8px;max-height:220px;overflow-y:auto;display:none;
  }
  #search-results div{padding:8px 12px;font-family:var(--mono);font-size:11px;cursor:pointer;color:var(--paper);}
  #search-results div:hover{background:var(--panel-line);}

  #info-panel{
    position:absolute;right:20px;bottom:20px;z-index:10;width:280px;
    background:var(--panel);border:1px solid var(--panel-line);border-radius:10px;
    padding:16px;display:none;
  }
  #info-panel.visible{display:block;}
  #info-panel .name{font-size:14px;font-weight:600;color:var(--accent);word-break:break-word;margin-bottom:2px;}
  #info-panel .tag{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
  #info-panel .metric{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;padding:3px 0;}
  #info-panel .metric span:first-child{color:var(--muted);}
  #info-panel .close-btn{
    position:absolute;top:10px;right:12px;background:none;border:none;
    color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0;
  }
  #info-panel .close-btn:hover{color:var(--paper);}

  #loading, #empty-state{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:20;text-align:center;padding:20px;
  }
  #loading .mark, #empty-state .mark{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
  #empty-state .mark{color:var(--accent);max-width:420px;line-height:1.6;}
  #empty-state{display:none;}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--panel-line);border-radius:3px;}
</style>
</head>
<body>
<div id="app">
  <div id="graph-container"></div>

  <div id="loading"><div class="mark">Loading network —</div></div>
  <div id="empty-state">
    <div class="mark"></div>
  </div>

  <header>
    <div class="title">
      <h1>HPV Discourse Network</h1>
      <div class="sub" id="platform-sub">facebook_nodes.json / facebook_edges.json</div>
    </div>
    <div id="platform-toggle">
      <button id="btn-facebook" class="active">Facebook</button>
      <button id="btn-tiktok">TikTok</button>
    </div>
  </header>

  <div id="search-box">
    <input type="text" id="search-input" placeholder="Find an actor…" autocomplete="off">
    <div id="search-results"></div>
  </div>

  <div id="left-rail">
    <h2>Network summary</h2>
    <div class="stat-row"><span>Nodes</span><span id="stat-nodes">—</span></div>
    <div class="stat-row"><span>Edges</span><span id="stat-edges">—</span></div>
    <div class="stat-row"><span>Communities</span><span id="stat-communities">—</span></div>
    <div class="stat-row"><span>Solo actors</span><span id="stat-solo">—</span></div>
    <div class="divider"></div>
    <h2>Legend</h2>
    <div id="legend"></div>
  </div>

  <div id="info-panel">
    <button class="close-btn" id="info-close">×</button>
    <div class="name" id="info-name"></div>
    <div class="tag" id="info-tag"></div>
    <div class="metric"><span>Degree centrality</span><span id="info-degree"></span></div>
    <div class="metric"><span>Betweenness</span><span id="info-betweenness"></span></div>
    <div class="metric"><span>Eigenvector</span><span id="info-eigenvector"></span></div>
    <div class="metric"><span>Community</span><span id="info-community"></span></div>
  </div>
</div>

<script>
/* -------------------------------------------------------------------------
   HPV Network Dashboard — M1 static viewer
   Reads <prefix>_nodes.json / <prefix>_edges.json produced by the Colab
   pipeline (Alpha M1). No backend, no build step — everything happens
   client-side after the two JSON files load.
------------------------------------------------------------------------- */

const PLATFORMS = {
  facebook: { nodesFile: "facebook_nodes.json", edgesFile: "facebook_edges.json", label: "Facebook" },
  tiktok:   { nodesFile: "tiktok_nodes.json",   edgesFile: "tiktok_edges.json",   label: "TikTok" },
};

const COMMUNITY_PALETTE = ["#4fd1c5","#ff8a5c","#7c9aff","#e0d068","#c876e0","#6bd47a","#e07c9a","#8fb8c9"];
const SOLO_COLOR = "#3a5560";

let renderer = null;
let currentGraph = null;
let currentNodes = [];

const $ = (id) => document.getElementById(id);

function communityColor(id){
  return COMMUNITY_PALETTE[((id % COMMUNITY_PALETTE.length) + COMMUNITY_PALETTE.length) % COMMUNITY_PALETTE.length];
}

async function loadPlatform(key){
  const cfg = PLATFORMS[key];
  $("loading").style.display = "flex";
  $("empty-state").style.display = "none";
  $("info-panel").classList.remove("visible");
  $("platform-sub").textContent = `${cfg.nodesFile} / ${cfg.edgesFile}`;

  document.querySelectorAll("#platform-toggle button").forEach(b => b.classList.remove("active"));
  $("btn-" + key).classList.add("active");

  let nodes, edges;
  try{
    const [nRes, eRes] = await Promise.all([fetch(cfg.nodesFile), fetch(cfg.edgesFile)]);
    if(!nRes.ok || !eRes.ok) throw new Error("fetch failed");
    nodes = await nRes.json();
    edges = await eRes.json();
  }catch(err){
    $("loading").style.display = "none";
    $("empty-state").style.display = "flex";
    $("empty-state").querySelector(".mark").innerHTML =
      `Couldn't load <strong>${cfg.nodesFile}</strong> / <strong>${cfg.edgesFile}</strong>.<br><br>` +
      `Place both files from the Colab pipeline in the same folder as this page, then reload.`;
    return;
  }

  buildGraph(nodes, edges, cfg.label);
}

function buildGraph(nodes, edges, platformLabel){
  if(renderer){ renderer.kill(); renderer = null; }

  const graph = new graphology.Graph({ multi: true, type: "directed" });
  currentNodes = nodes;

  const degrees = nodes.map(n => n.degree_centrality || 0);
  const maxDeg = Math.max(...degrees, 0.0001);

  nodes.forEach(n => {
    const isSolo = !!n.is_solo;
    const size = 3 + (n.degree_centrality / maxDeg) * 14;
    graph.addNode(n.id, {
      x: n.x, y: n.y,
      size,
      label: n.label || n.id,
      color: isSolo ? SOLO_COLOR : communityColor(n.community),
      _degree: n.degree_centrality || 0,
      _betweenness: n.betweenness_centrality || 0,
      _eigenvector: n.eigenvector_centrality || 0,
      _community: n.community,
      _solo: isSolo,
    });
  });

  let skipped = 0;
  edges.forEach((e, i) => {
    if(!graph.hasNode(e.source) || !graph.hasNode(e.target)){ skipped++; return; }
    try{
      graph.addEdgeWithKey("e" + i, e.source, e.target, {
        size: Math.min(0.3 + Math.log(1 + (e.weight||1)) * 0.4, 3),
        color: e.is_selfloop ? "rgba(58,85,96,0.35)" : "rgba(127,160,172,0.25)",
      });
    }catch(_){ skipped++; }
  });

  currentGraph = graph;

  const container = $("graph-container");
  renderer = new Sigma(graph, container, {
    minCameraRatio: 0.05,
    maxCameraRatio: 10,
    labelRenderedSizeThreshold: 8,
    defaultNodeColor: SOLO_COLOR,
  });

  renderer.on("clickNode", ({ node }) => showInfo(node));
  renderer.on("clickStage", () => $("info-panel").classList.remove("visible"));

  updateSummary(graph, platformLabel);
  buildLegend(graph);
  $("loading").style.display = "none";
}

function updateSummary(graph, platformLabel){
  const solo = graph.filterNodes((n, attrs) => attrs._solo).length;
  const communities = new Set(graph.mapNodes((n, attrs) => attrs._community));
  $("stat-nodes").textContent = graph.order.toLocaleString();
  $("stat-edges").textContent = graph.size.toLocaleString();
  $("stat-communities").textContent = communities.size.toLocaleString();
  $("stat-solo").textContent = solo.toLocaleString() + ` (${((solo/graph.order)*100).toFixed(0)}%)`;
}

function buildLegend(graph){
  const counts = {};
  graph.forEachNode((n, attrs) => {
    if(attrs._solo) return;
    counts[attrs._community] = (counts[attrs._community]||0) + 1;
  });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const legend = $("legend");
  legend.innerHTML = "";
  top.forEach(([cid, count]) => {
    const row = document.createElement("div");
    row.className = "legend-item";
    row.innerHTML = `<span class="legend-dot" style="background:${communityColor(Number(cid))}"></span>Community ${cid} (${count})`;
    legend.appendChild(row);
  });
  const soloRow = document.createElement("div");
  soloRow.className = "legend-item";
  soloRow.innerHTML = `<span class="legend-dot solo"></span>Solo actor (no cross-account interaction)`;
  legend.appendChild(soloRow);
}

function showInfo(nodeId){
  const attrs = currentGraph.getNodeAttributes(nodeId);
  $("info-name").textContent = attrs.label;
  $("info-tag").textContent = attrs._solo ? "Solo actor" : `Community ${attrs._community}`;
  $("info-degree").textContent = attrs._degree.toFixed(4);
  $("info-betweenness").textContent = attrs._betweenness.toFixed(4);
  $("info-eigenvector").textContent = attrs._eigenvector.toFixed(4);
  $("info-community").textContent = attrs._solo ? "— (solo)" : attrs._community;
  $("info-panel").classList.add("visible");

  const pos = renderer.getNodeDisplayData(nodeId);
  renderer.getCamera().animate({ x: pos.x, y: pos.y, ratio: Math.max(renderer.getCamera().ratio * 0.6, 0.08) }, { duration: 400 });
}

$("info-close").addEventListener("click", () => $("info-panel").classList.remove("visible"));

let searchDebounce;
$("search-input").addEventListener("input", (e) => {
  clearTimeout(searchDebounce);
  const q = e.target.value.trim().toLowerCase();
  const resultsBox = $("search-results");
  if(!q){ resultsBox.style.display = "none"; return; }
  searchDebounce = setTimeout(() => {
    const matches = currentNodes
      .filter(n => (n.label||n.id).toLowerCase().includes(q))
      .slice(0, 12);
    resultsBox.innerHTML = "";
    if(matches.length === 0){
      resultsBox.style.display = "none";
      return;
    }
    matches.forEach(n => {
      const div = document.createElement("div");
      div.textContent = n.label || n.id;
      div.addEventListener("click", () => {
        showInfo(n.id);
        resultsBox.style.display = "none";
        $("search-input").value = n.label || n.id;
      });
      resultsBox.appendChild(div);
    });
    resultsBox.style.display = "block";
  }, 150);
});

$("btn-facebook").addEventListener("click", () => loadPlatform("facebook"));
$("btn-tiktok").addEventListener("click", () => loadPlatform("tiktok"));

loadPlatform("facebook");
</script>
</body>
</html>
